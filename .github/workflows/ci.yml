name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      # Syntax check — catches typos, bad imports, missing semicolons.
      - run: node --check index.js
      # Boot check — start the server over stdio, initialize, list tools,
      # require >=10 registered tools, then exit cleanly.
      - name: MCP boot + tools/list smoke
        run: |
          printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            | timeout 10 node index.js \
            | node -e 'let buf=""; process.stdin.on("data",d=>buf+=d); process.stdin.on("end",()=>{const lines=buf.trim().split("\n"); const init=JSON.parse(lines[0]); const list=JSON.parse(lines[1]); if(!init.result) {console.error("initialize failed",init); process.exit(1);} if(!list.result || list.result.tools.length < 10) {console.error("tools/list wrong", list); process.exit(1);} console.log("OK — server", init.result.serverInfo.name+"@"+init.result.serverInfo.version, "|", list.result.tools.length, "tools");});'

  publish:
    needs: smoke
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # id-token: write is the OIDC token npm's Trusted Publishing flow uses
      # to verify this workflow. No NPM_TOKEN secret is required; configure
      # Trusted Publishing on npmjs.com for the complete-codes-mcp-server
      # package: Settings → Trusted Publisher → GitHub Actions, with
      # repository=CompleteCodes/cc-mcp-server and workflow=ci.yml.
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm publish --access public --provenance
