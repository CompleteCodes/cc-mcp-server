name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      # Syntax check — catches typos, bad imports, missing semicolons.
      - run: node --check index.js
      # Vitest integration suite — spawns the server over stdio, verifies
      # tools/list shape, fee / slider math against the canonical app config,
      # and the CC_API_TOKEN auth-error contract on every authenticated tool.
      - run: npm test

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # id-token: write is the OIDC token npm's Trusted Publishing flow uses
      # to verify this workflow. No NPM_TOKEN secret is required; configure
      # Trusted Publishing on npmjs.com for the complete-codes-mcp-server
      # package: Settings → Trusted Publisher → GitHub Actions, with
      # repository=CompleteCodes/cc-mcp-server and workflow=ci.yml.
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm publish --access public --provenance
